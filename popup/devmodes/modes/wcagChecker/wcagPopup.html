<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WCAG Checker</title>
  <link rel="stylesheet" href="wcagPopup.css">
</head>

<body>

<div class="main-container">

<a href="../../devMode.html" class="back-btn">
  <svg width="20" height="20" viewBox="0 0 24 24">
    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" fill="none"/>
  </svg>
  Back
</a>

<!-- AUTO CHECKER -->
<div class="btn-wrapper">
  <a href="../wcagChecker/auto/autoChecker.html" class="btn">
    Auto Checker
  </a>

  <div class="info-icon">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <circle cx="12" cy="8" r="1"></circle>
    </svg>
  </div>

  <div class="info-popup auto">
    Automatically scans the webpage and detects WCAG accessibility contast issues.
  </div>

<div class="btn-wrapper">
  <button class="btn" id="openPanel">
    Manual Checker
  </button>

  <div class="info-icon">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <circle cx="12" cy="8" r="1"></circle>
    </svg>
  </div>

  <div class="info-popup manual">
    Allows manual inspection of WCAG accessibility contrast issues .
  </div>
</div>
</div>
  <script src="wcagPopup.js"></script>
