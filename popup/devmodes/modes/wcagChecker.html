<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WCAG Contrast Analysis</title>
  <link rel="stylesheet" href="wcagChecker.css">
</head>
<body>

<div class="wcag-container">

  <!-- NAV -->
  <nav class="wcag-nav">
    <h1 class="nav-title">WCAG Contrast Analysis</h1>

    <div class="btn-container">
      <button id="runScanBtn" class="nav-btn scanner-btn">
        Run Scan
      </button>
    </div>

    <div class="nav-checked">
      Checked: <span>0</span>
    </div>
  </nav>

  <div class="wcag-body">

    <!-- LEFT PANEL -->
<div class="left-panel inactive">

  <div class="left-panel-header">
    Contrast Details
  </div>

  <!-- Empty State -->
  <div class="left-empty">
    No result selected
  </div>

  <!-- Actual Content (Hidden Initially) -->
  <div class="left-content">

    <div class="contrast-ratio-section">
      <div class="ratio-row">
        <span class="ratio-value">-- : 1</span>
        <span class="status-badge">--</span>
      </div>
      <div class="quality-badge"></div>
    </div>

    <div class="colors-section">
      <div class="color-item">
        <span class="color-label">Foreground</span>
        <div class="color-row">
          <span class="color-swatch"></span>
          <span class="color-hex">--</span>
        </div>
      </div>

      <div class="color-item">
        <span class="color-label">Background</span>
        <div class="color-row">
          <span class="color-swatch"></span>
          <span class="color-hex">--</span>
        </div>
      </div>
    </div>

  </div>
</div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <div class="scan-summary">
            <h2>Scan Summary</h2>
            <div class="summary-stats">

              <div class="stat-card">
                <span class="stat-label">Checked</span>
                <span class="stat-num stat-num-checked">0</span>
              </div>

              <div class="stat-card">
                <span class="stat-label stat-label-pass">✅ Pass</span>
                <span class="stat-num stat-num-pass">0</span>
              </div>

              <div class="stat-card">
                <span class="stat-label stat-label-fail">✕ Fail</span>
                <span class="stat-num stat-num-fail">0</span>
              </div>

              <div class="stat-card">
                <span class="stat-label stat-label-aaa">✕ AAA</span>
                <span class="stat-num stat-num-aaa">0</span>
              </div>

            </div>
          </div>

      <div class="results-section">
       <div class="results-header">
          <h2>Results</h2>

          <select class="sort-btn" id="sortSelect">
            <option value="default" selected>Sort by: default</option>
            <option value="ratio">Sort by: Ratio</option>
            <option value="pass">Sort by: Pass</option>
            <option value="fail">Sort by: Fail</option>
            <option value="aaa">Sort by: AAA</option>
          </select>
        </div>
        <div class="results-list">
          <div style="text-align:center;padding:20px;color:#6B7280;">
            Click "Run Scan" to analyze page
          </div>
        </div>
      </div>
      <!-- Tips Bar -->
      <div class="tips-bar">
        <div class="tips-label">💡 Contrast Tips</div>
        <div class="tips-items">
          <div class="tip-chip">
            <span class="check-green">✔</span>
            AAA Normal: <strong style="margin-left:3px">7:1</strong>
          </div>
          <div class="tip-chip">
            <span class="check-green">✔</span>
            AA Large: <span class="ratio-val" style="margin-left:3px">3.0:1</span>
          </div>
          <div class="tip-chip">
            <span class="check-purple">✔</span>
            AAA Large: <span class="ratio-val-purple" style="margin-left:3px">4.5:1</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="wcagChecker.js"></script>
</body>
</html>
